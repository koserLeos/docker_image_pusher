name: Docker Image Sync To Aliyun
on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  IMAGE_LIST_FILE: "images.txt"

jobs:
  build:
    name: Sync Image Task
    runs-on: ubuntu-latest
    steps:
      - name: Check initial disk usage
        run: |
          echo "===== 初始磁盘信息 ====="
          df -hT

      - name: Move Docker data to large partition /mnt
        run: |
          sudo systemctl stop docker
          sudo mv /var/lib/docker /mnt/docker-data
          sudo ln -s /mnt/docker-data /var/lib/docker
          sudo systemctl start docker
          docker info | grep "Docker Root Dir"

      - name: Free system disk space
        uses: jlumbroso/free-disk-space@main
        with:
          dotnet: true
          haskell: true
          android: false
          codeql: false
          large-packages: true
          swap-storage: true

      - name: Check disk after cleanup
        run: |
          echo "===== 清理后磁盘信息 ====="
          df -hT

      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Sync images to Aliyun Registry
        run: |
          set -eo pipefail
          # 关闭严格未定义变量检测，从根源规避空变量报错
          set +u

          # 登录阿里云镜像仓库
          echo "登录阿里云镜像仓库: $ALIYUN_REGISTRY"
          echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

          # 临时文件存储镜像名+命名空间映射
          TMP_MAP=$(mktemp)
          cat ${IMAGE_LIST_FILE} | while IFS= read -r raw_line || [ -n "$raw_line" ]; do
            line=$(echo "$raw_line" | xargs)
            echo "$line" | grep -E '^#|^$' >/dev/null && continue
            pure_image=$(echo "$line" | awk '{print $NF}' | cut -d'@' -f1)
            img_short=$(echo "$pure_image" | awk -F'/' '{print $NF}')
            img_name=$(echo "$img_short" | cut -d':' -f1)
            ns_part=$(echo "$pure_image" | sed -E 's/\/[^/]+$//')
            echo "${img_name}|${ns_part}" >> "$TMP_MAP"
          done

          # 逐行处理镜像
          cat ${IMAGE_LIST_FILE} | while IFS= read -r raw_line || [ -n "$raw_line" ]; do
            line=$(echo "$raw_line" | xargs)
            echo "$line" | grep -E '^#|^$' >/dev/null && continue
            echo -e "\n==================== 开始处理镜像行: $line ===================="

            # 提取平台参数
            platform=$(echo "$line" | grep -oE '--platform[ =][^ ]+' | awk '{print $2}')
            platform_prefix=$(echo "$platform" | sed 's/\//_/g' | sed 's/$/_/')

            pure_image=$(echo "$line" | awk '{print $NF}' | cut -d'@' -f1)
            img_short=$(echo "$pure_image" | awk -F'/' '{print $NF}')
            img_name=$(echo "$img_short" | cut -d':' -f1)
            ns_part=$(echo "$pure_image" | sed -E 's/\/[^/]+$//')

            # 统计当前镜像名对应的不同命名空间数量
            unique_ns=$(grep "^${img_name}|" "$TMP_MAP" | cut -d'|' -f2 | sort -u | wc -l)
            ns_prefix=""
            echo "$unique_ns" | grep -v '^1$' >/dev/null && ns_prefix=$(echo "$ns_part" | sed 's/\//_/g' | sed 's/$/_/')

            # 拼接目标镜像地址
            target_img="${ALIYUN_REGISTRY}/${ALIYUN_NAME_SPACE}/${platform_prefix}${ns_prefix}${img_short}"
            echo "原始镜像: $pure_image"
            echo "目标镜像: $target_img"

            # 拉取、打标、推送
            echo "执行拉取: docker pull $line"
            docker pull $line
            docker tag "$pure_image" "$target_img"
            echo "执行推送: docker push $target_img"
            docker push "$target_img"

            # 清理本地镜像
            docker rmi "$target_img" || true
            docker rmi "$pure_image" || true
            docker system prune -f
            echo "当前磁盘使用:"
            df -hT
          done

          # 清理临时文件、退出登录
          rm -f "$TMP_MAP"
          docker logout "$ALIYUN_REGISTRY"