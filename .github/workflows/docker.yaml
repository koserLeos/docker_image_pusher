name: Docker Image Sync To Aliyun
on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]

# 全局环境变量
env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  # 镜像列表文件路径
  IMAGE_LIST_FILE: "images.txt"

jobs:
  build:
    name: Sync Image Task
    runs-on: ubuntu-latest
    steps:
      # 1. 初始磁盘查看
      - name: Check initial disk usage
        run: |
          echo "===== 初始磁盘信息 ====="
          df -hT

      # 2. 迁移Docker目录到/mnt(解决核心磁盘不足，GitHub Runner专属优化)
      - name: Move Docker data to large partition /mnt
        run: |
          sudo systemctl stop docker
          # 迁移Docker数据目录到大分区
          sudo mv /var/lib/docker /mnt/docker-data
          sudo ln -s /mnt/docker-data /var/lib/docker
          sudo systemctl start docker
          # 验证Docker根目录
          docker info | grep "Docker Root Dir"

      # 3. 深度清理系统冗余组件(替代原有maximize-build-space，更稳定)
      - name: Free system disk space
        uses: jlumbroso/free-disk-space@main
        with:
          dotnet: true
          haskell: true
          android: false
          codeql: false
          large-packages: true
          swap-storage: true

      # 4. 再次检查磁盘
      - name: Check disk after cleanup
        run: |
          echo "===== 清理后磁盘信息 ====="
          df -hT

      # 5. 拉取代码(必须步骤，读取images.txt)
      - name: Checkout repository code
        uses: actions/checkout@v4

      # ===================== 核心镜像同步脚本(全量修复Shell逻辑) =====================
      - name: Sync images to Aliyun Registry
        run: |
          # 开启脚本错误中断，任意命令失败则终止流程
          set -euo pipefail

# 校验镜像列表文件是否存在
          if [ ! -f "${{ env.IMAGE_LIST_FILE }}" ]; then
              echo "ERROR: 镜像列表文件 ${{ env.IMAGE_LIST_FILE }} 不存在！"
               exit 1
            fi

# 登录阿里云镜像仓库
          echo "登录阿里云镜像仓库: $ALIYUN_REGISTRY"
          docker login -u "$ALIYUN_REGISTRY_USER" -p "$ALIYUN_REGISTRY_PASSWORD" "$ALIYUN_REGISTRY"

# 声明数组：记录重名镜像(镜像名 -> 命名空间)
          declare -A img_ns_map
          declare -A duplicate_img

# ========== 第一轮：预扫描，识别重名镜像 ==========
          while IFS= read -r raw_line || [ -n "$raw_line" ]; do
            # 去除行首尾空格、跳过空行/注释行
            line=$(echo "$raw_line" | xargs)
            [[ -z "$line" || "$line" =~ ^# ]] && continue

  # 提取纯镜像地址(剔除--platform参数、@sha256摘要)
          pure_image=$(echo "$line" | awk '{print $NF}' | cut -d'@' -f1)
  # 提取镜像名(最后一段，如 a/b/c:tag -> c:tag)
          img_short=$(echo "$pure_image" | awk -F'/' '{print $NF}')
          img_name=$(echo "$img_short" | cut -d':' -f1)
  # 提取命名空间(兼容所有仓库格式)
          ns_part=$(echo "$pure_image" | sed -E 's/\/[^/]+$//')

  # 修复点：改用 ${arr[key]+x} 判断键是否存在，兼容低版本bash
          if [[ -n "${img_ns_map[$img_name]+x}" ]]; then
            if [[ "${img_ns_map[$img_name]}" != "$ns_part" ]]; then
              duplicate_img[$img_name]="1"
            fi
          else
            img_ns_map[$img_name]="$ns_part"
          fi
        done < "${{ env.IMAGE_LIST_FILE }}"

# ========== 第二轮：逐行拉取、转存、推送镜像 ==========
        while IFS= read -r raw_line || [ -n "$raw_line" ]; do
          # 清洗行数据
          line=$(echo "$raw_line" | xargs)
          [[ -z "$line" || "$line" =~ ^# ]] && continue
          echo -e "\n==================== 开始处理镜像行: $line ===================="

  # 1. 提取架构参数 --platform
        platform=""
        if [[ "$line" =~ --platform[ =]([^ ]+) ]]; then
          platform="${BASH_REMATCH[1]}"
        fi
  # 架构前缀(替换/为_，避免路径非法)
        platform_prefix=""
        if [[ -n "$platform" ]]; then
          platform_prefix="${platform//\//_}_"
        fi

  # 2. 提取原始镜像(剔除参数、摘要)
        pure_image=$(echo "$line" | awk '{print $NF}' | cut -d'@' -f1)
        img_short=$(echo "$pure_image" | awk -F'/' '{print $NF}')
        img_name=$(echo "$img_short" | cut -d':' -f1)
        ns_part=$(echo "$pure_image" | sed -E 's/\/[^/]+$//')

  # 3. 修复点：改用兼容语法判断重名镜像
        ns_prefix=""
        if [[ -n "${duplicate_img[$img_name]+x}" && -n "$ns_part" ]]; then
          ns_prefix="${ns_part//\//_}_"
        fi

  # 4. 拼接阿里云目标镜像地址(符合Docker规范)
        target_img="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$ns_prefix$img_short"
        echo "原始镜像: $pure_image"
        echo "目标镜像: $target_img"

  # 5. 拉取原始镜像
        echo "执行拉取: docker pull $line"
        docker pull $line

  # 6. 打标签 + 推送阿里云
        docker tag "$pure_image" "$target_img"
        echo "执行推送: docker push $target_img"
        docker push "$target_img"

  # 7. 清理本地镜像(优先删除临时标签，再删原镜像)
        docker rmi "$target_img" || true
        docker rmi "$pure_image" || true

  # 8. 单次镜像处理后执行Docker垃圾回收(防止磁盘累积)
        docker system prune -f
        echo "当前磁盘使用:"
        df -hT
      done < "${{ env.IMAGE_LIST_FILE }}"

# 退出登录
      docker logout "$ALIYUN_REGISTRY"